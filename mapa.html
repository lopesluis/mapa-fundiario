<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mapa Fundiário</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100vh; }
    #btn-toggle {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 24px;
      font-size: 15px;
      font-family: sans-serif;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="btn-toggle">🗺️ Mapa</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    var map = L.map('map', { zoomControl: true, attributionControl: false });

    var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
    var satelite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20 });

    // Inicia com satélite
    satelite.addTo(map);
    var sateliteAtivo = true;

    document.getElementById('btn-toggle').addEventListener('click', function() {
      if (sateliteAtivo) {
        map.removeLayer(satelite);
        osm.addTo(map);
        this.textContent = '🛰️ Satélite';
        sateliteAtivo = false;
      } else {
        map.removeLayer(osm);
        satelite.addTo(map);
        this.textContent = '🗺️ Mapa';
        sateliteAtivo = true;
      }
      if (poligono) poligono.bringToFront();
    });

    var params = new URLSearchParams(window.location.search);
    var lat = parseFloat(params.get('lat'));
    var lon = parseFloat(params.get('lon'));
    var poligono = null;

    try {
      var coordsRaw = params.get('coords');
      var coords = JSON.parse(decodeURIComponent(coordsRaw));
      var latlngs = coords.map(function(c) { return [c[1], c[0]]; });

      poligono = L.polygon(latlngs, {
        color: '#FFD700',
        weight: 2.5,
        fillColor: '#FFD700',
        fillOpacity: 0.15
      }).addTo(map);

      map.fitBounds(poligono.getBounds(), { padding: [40, 40] });
    } catch(e) {
      if (!isNaN(lat) && !isNaN(lon)) {
        map.setView([lat, lon], 15);
      }
    }

    if (!isNaN(lat) && !isNaN(lon)) {
      L.circleMarker([lat, lon], {
        radius: 6,
        color: '#0066ff',
        fillColor: '#0066ff',
        fillOpacity: 1,
        weight: 2
      }).addTo(map);
    }
  </script>
</body>
</html>
