<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mapa Fundiário</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    // Inicializa o mapa com camada de satélite ESRI
    var map = L.map('map', {
      zoomControl: true,
      attributionControl: false
    });

    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 19 }
    ).addTo(map);

    // Lê o polígono da URL
    var params = new URLSearchParams(window.location.search);
    var lat = parseFloat(params.get('lat'));
    var lon = parseFloat(params.get('lon'));
    var fonte = params.get('fonte') || 'Imóvel';

    try {
      var coordsRaw = params.get('coords');
      var coords = JSON.parse(decodeURIComponent(coordsRaw));

      // Converte para formato Leaflet [lat, lon]
      var latlngs = coords.map(function(c) { return [c[1], c[0]]; });

      var poligono = L.polygon(latlngs, {
        color: '#FFD700',
        weight: 2,
        fillColor: '#FFD700',
        fillOpacity: 0.1
      }).addTo(map);

      map.fitBounds(poligono.getBounds(), { padding: [30, 30] });

    } catch(e) {
      // Se não tiver polígono, centraliza no ponto
      if (!isNaN(lat) && !isNaN(lon)) {
        map.setView([lat, lon], 15);
      }
    }

    // Marker no ponto consultado
    if (!isNaN(lat) && !isNaN(lon)) {
      L.circleMarker([lat, lon], {
        radius: 6,
        color: '#0066ff',
        fillColor: '#0066ff',
        fillOpacity: 1,
        weight: 2
      }).addTo(map);
    }
  </script>
</body>
</html>
